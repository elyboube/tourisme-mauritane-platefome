{% extends 'base.html' %}
{% block title %}Confirmer la suppression{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 rounded-4 shadow-lg text-center">
                <div class="card-body p-5">
                    <div class="mb-4" style="font-size:4rem;color:#e74c3c">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <h4 class="fw-bold mb-3">Confirmer la suppression</h4>
                    <p class="text-muted mb-4">
                        Êtes-vous sûr de vouloir supprimer <strong>{{ obj }}</strong> ?<br>
                        Cette action est <span class="text-danger fw-bold">irréversible</span>.
                    </p>
                    <form method="post" class="d-flex gap-3 justify-content-center">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-lg px-5">
                            <i class="fas fa-trash me-2"></i>Supprimer
                        </button>
                        <a href="{% url 'admin_destinations' %}" class="btn btn-outline-secondary btn-lg px-5">
                            Annuler
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
